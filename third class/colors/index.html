<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Colors</title>
    <style>
      /* colors */
      /* foreground & background colors */
      p {
        font-weight: bolder;
        font-size: larger;
        /* hexa code */
        color: #fd005d;
      }
      h1 {
        /* RGB color */
        color: rgb(248, 0, 170);
      }
      /* .section_1{
        background-color: rgb(130, 140, 129);
        opacity: 0.4;
      } */
      .section_1 {
        /* rgba where a is used for obacity like mirror */
        background-color: rgba(50, 100, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="section_1">
      <p>
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Quae, veniam!
      </p>
      <h1>rgb</h1>
    </div>
  </body>
</html>
